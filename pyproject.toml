[project]
name = "deep-research"
version = "0.1.0"
description = "Deep Research Agent — multi-round iterative web research powered by MAF"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "agent-framework>=1.0.0,<2",
    "agent-framework-github-copilot",
    "click",
    "duckduckgo-search",
    "httpx",
    "trafilatura",
]

[project.scripts]
deep-research = "deep_research.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
